dump_device_info:
  name: Dump device info
  description: Query the Sony device and write a JSON diagnostics dump into the Home Assistant config directory.
  fields:
    host:
      name: Host
      description: Optional host/IP if multiple Sony Audio Control devices are configured.
      example: "192.168.1.14"
      selector:
        text:
    include_raw:
      name: Include raw identifiers
      description: Include host and MAC addresses in the generated file. Leave off when sharing diagnostics publicly.
      default: false
      selector:
        boolean:

call_api:
  name: Call Sony API
  description: Advanced/debug service for calling a Sony JSON-RPC endpoint directly. Result is written to the Home Assistant log.
  fields:
    host:
      name: Host
      description: Optional host/IP if multiple Sony Audio Control devices are configured.
      example: "192.168.1.14"
      selector:
        text:
    endpoint:
      name: Endpoint
      required: true
      example: "audio"
      selector:
        text:
    method:
      name: Method
      required: true
      example: "getSpeakerSettings"
      selector:
        text:
    params:
      name: Params
      description: JSON-RPC params array.
      example: [{"target": "subwooferLevel"}]
      selector:
        object:
